<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Cabeza -->
  <rect x="18" y="14" width="44" height="38" rx="10" stroke="white" stroke-width="2.5"/>
  <!-- Visor / pantalla -->
  <rect x="26" y="24" width="28" height="16" rx="5" stroke="white" stroke-width="2"/>
  <!-- Detalle dentro del visor (línea central) -->
  <line x1="40" y1="24" x2="40" y2="40" stroke="white" stroke-width="1.5"/>
  <!-- Oreja izquierda -->
  <circle cx="14" cy="33" r="4" stroke="white" stroke-width="2"/>
  <!-- Oreja derecha -->
  <circle cx="66" cy="33" r="4" stroke="white" stroke-width="2"/>
  <!-- Brazo izquierdo -->
  <line x1="28" y1="52" x2="24" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Brazo derecho -->
  <line x1="52" y1="52" x2="56" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cuello -->
  <rect x="34" y="50" width="12" height="6" rx="2" stroke="white" stroke-width="2"/>
</svg>
